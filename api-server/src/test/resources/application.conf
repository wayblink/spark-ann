# Test configuration

ann-service {
  version = "1.0.0-test"

  server {
    host = "127.0.0.1"
    port = 0  # Random available port
    request-timeout = 10s
  }

  index {
    base-path = "/tmp/ann-test-indexes"
    max-loaded-indexes = 5
  }

  search {
    default-ef = 50
    max-k = 100
    timeout = 5s
  }

  hnsw {
    default-m = 8
    default-ef-construction = 100
    default-distance-type = "euclidean"
  }
}

akka {
  loglevel = "WARNING"

  http {
    server {
      idle-timeout = 10s
      request-timeout = 10s
    }
  }
}
