# ANN API Server Configuration

ann-service {
  # API version
  version = "1.0.0"

  server {
    # Host to bind to (0.0.0.0 for all interfaces)
    host = "0.0.0.0"
    host = ${?ANN_SERVER_HOST}

    # Port to bind to
    port = 8080
    port = ${?ANN_SERVER_PORT}

    # Request timeout
    request-timeout = 30s
  }

  index {
    # Base path for index files
    base-path = "/data/indexes"
    base-path = ${?ANN_INDEX_PATH}

    # Maximum number of indexes to keep in memory
    max-loaded-indexes = 10
  }

  search {
    # Default ef parameter for search
    default-ef = 50

    # Maximum k value allowed
    max-k = 1000

    # Search timeout
    timeout = 10s
  }

  hnsw {
    # Default M parameter for index construction
    default-m = 16

    # Default efConstruction parameter
    default-ef-construction = 200

    # Default distance type
    default-distance-type = "euclidean"
  }
}

# Akka configuration
akka {
  loglevel = "INFO"

  http {
    server {
      # Increase idle timeout for long-running requests
      idle-timeout = 60s

      # Request timeout
      request-timeout = 30s

      # Maximum content length (for large vector uploads)
      parsing.max-content-length = 100m
    }
  }

  actor {
    # Use typed actor system
    typed {
      # Restart strategy
      default-mailbox-type = "akka.dispatch.SingleConsumerOnlyUnboundedMailbox"
    }
  }
}
